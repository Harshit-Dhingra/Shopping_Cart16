<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content)">
<head>
    <meta charset="UTF-8">
    <title>Base</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css?v=2}">
</head>
<!-- ✅ ONLY CHANGE DONE HERE -->
<body style="display:flex; flex-direction:column; min-height:100vh;">

<!-- Start Navbar -->
<nav class="navbar navbar-expand-lg bg-primary navbar-dark fixed-top">
    <div class="container-fluid">

        <!-- LOGO -->
        <a class="navbar-brand" href="#">
            <i class="fa-solid fa-cart-shopping"></i> Ecom Store
        </a>

        <!-- TOGGLE -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- NAVBAR CONTENT -->
        <div class="collapse navbar-collapse" id="navbarSupportedContent">

            <!-- LEFT SIDE -->
            <ul class="navbar-nav me-auto">

                <li class="nav-item">
                    <a class="nav-link active" href="/">
                        <i class="fa-solid fa-house"></i> Home
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/products">Product</a>
                </li>

                <!-- DROPDOWN -->
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown"
                       role="button" data-bs-toggle="dropdown">
                        Category
                    </a>

                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="#">Action</a></li>
                        <li><a class="dropdown-item" href="#">Another action</a></li>
                    </ul>
                </li>

            </ul>

            <!-- RIGHT SIDE -->
            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/login}">LOGIN</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/register}">REGISTER</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/admin/">ADMIN</a>
                </li>

            </ul>

        </div>
    </div>
</nav>
<!-- End Navbar -->


<!-- ✅ WRAPPED CONTENT (IMPORTANT FIX) -->
<div style="flex:1;">
    <div th:replace="${content}"></div>
</div>


<!-- Start Footer -->
<div class="container-fluid p-1 bg-primary text-center text-white">
    <p>ecom.com</p>
</div>
<!-- End Footer -->


<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
