<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div th:replace="~{base :: layout(~{::section})}">
    <section>

        <div class="container" style="max-width: 430px; margin-top: 70px; margin-bottom: 70px;">

            <div class="card shadow-sm border-0">

                <!-- Header -->
                <div class="card-header text-center text-white"
                     style="background: linear-gradient(135deg, #0d6efd, #0a58ca); border-radius: 10px 10px 0 0;">
                    <h5 class="mb-0">Add Product</h5>
                </div>

                <!-- Body -->
                <div class="card-body px-4 py-3">

                    <form>

                        <!-- Title -->
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" placeholder="Title">
                            <label>Title</label>
                        </div>

                        <!-- Description -->
                        <div class="form-floating mb-3">
                            <textarea class="form-control" placeholder="Description" style="height: 80px;"></textarea>
                            <label>Description</label>
                        </div>

                        <!-- Category -->
                        <div class="form-floating mb-3">
                            <select class="form-control">
                                <option selected>--select--</option>
                                <option>Electronics</option>
                                <option>Clothes</option>
                            </select>
                            <label>Category</label>
                        </div>

                        <!-- Price -->
                        <div class="form-floating mb-3">
                            <input type="number" class="form-control" placeholder="Price">
                            <label>Price</label>
                        </div>

                        <!-- Stock -->
                        <div class="form-floating mb-3">
                            <input type="number" class="form-control" placeholder="Stock">
                            <label>Stock</label>
                        </div>

                        <!-- Image Upload -->
                        <div class="mb-3">
                            <label class="small mb-1">Upload Image</label>
                            <input type="file" class="form-control">
                        </div>

                        <!-- Button -->
                        <div class="d-grid mt-2">
                            <button class="btn btn-primary">Add Product</button>
                        </div>

                    </form>

                </div>

            </div>

        </div>

    </section>
</div>
</body>
</html>
