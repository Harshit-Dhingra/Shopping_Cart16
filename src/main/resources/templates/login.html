<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>
<body>
<div th:replace="~{base :: layout(~{::section})}">
    <section>
        <div class="container mt-5 p-5">
            <div class="row align-items-center">

                <!-- LEFT SIDE IMAGE -->
                <div class="col-md-6 p-5">
                    <img th:src="@{/css/img/Login_1.jpeg}"
                         width="100%" height="400px">
                </div>

                <!-- RIGHT SIDE LOGIN FORM -->
                <div class="col-md-6 p-5">
                    <div class="card shadow p-3 mb-5 bg-body rounded">

                        <div class="card-header text-center">
                            <p class="fs-4">Login</p>
                        </div>

                        <div class="card-body">
                            <form>
                                <div class="mb-3">
                                    <label>Email</label>
                                    <input type="email" class="form-control" name="email">
                                </div>

                                <div class="mb-3">
                                    <label>Password</label>
                                    <input type="password" class="form-control" name="password">
                                </div>

                                <button class="btn btn-primary w-100">Login</button>
                            </form>
                        </div>
<div class="card-footer text-center">
    <a href="#" class="text-decoration-none">Forgot Password</a><br>
    Don't have an account ? <a href="#" class="text-decoration-none">Create New Password</a>
</div>
                    </div>
                </div>

            </div>
        </div>
    </section>
</div>
</body>
</html>
