<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>View Product</title>
</head>

<body>

<div th:replace="~{base :: layout(~{::section})}">

  <section>
    <div class="container mt-5 mb-5">
      <div class="card shadow p-4">

        <div class="row align-items-center">

          <!-- LEFT: IMAGE -->
          <div class="col-md-6 text-center">
            <img th:src="@{/css/img/Laptop.jpeg}"
                 class="img-fluid"
                 style="max-height:300px;">
          </div>

          <!-- RIGHT: DETAILS -->
          <div class="col-md-6">

            <h3 class="mb-3">Laptop</h3>

            <p>
              <span class="fw-bold">Description :</span><br>
              Hp Laptop, 256GB SSD
            </p>

            <p>
              <span class="fw-bold">Product Details :</span><br>

              Status :
              <span class="badge bg-success">Available</span>
              <span class="badge bg-warning text-dark">out of stock</span><br>

              Category : Laptop<br>
              Policy : 7 Days Replacement & Return
            </p>

            <!-- PRICE -->
            <h4 class="fw-bold">
              Price :
              ₹70000
              <span class="text-secondary text-decoration-line-through fs-6">₹140000</span>
              <span class="text-success fs-6">50% off</span>
            </h4>

            <!-- FEATURES -->
            <div class="row mt-4 text-center">

              <div class="col-md-4 text-danger">
                <i class="fas fa-money-bill-wave fa-2x"></i>
                <p>Cash On Delivery</p>
              </div>

              <div class="col-md-4 text-danger">
                <i class="fas fa-undo-alt fa-2x"></i>
                <p>Return Available</p>
              </div>

              <div class="col-md-4 text-danger">
                <i class="fas fa-truck fa-2x"></i>
                <p>Free Shipping</p>
              </div>

            </div>

            <!-- BUTTON -->
            <div class="mt-4">
              <a href="#" class="btn btn-danger w-100">Add To Cart</a>
            </div>

          </div>

        </div>

      </div>
    </div>
  </section>

</div>

</body>
</html>
